<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feed Enhancer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0d0d0f;
    --surface:   #141418;
    --surface2:  #1c1c22;
    --border:    #2a2a33;
    --accent:    #ff3b3b;
    --accent2:   #ff7043;
    --text:      #e8e8f0;
    --muted:     #666678;
    --green:     #22c55e;
    --yellow:    #f59e0b;
    --mono:      'Space Mono', monospace;
    --sans:      'DM Sans', sans-serif;
    --radius:    12px;
    --transition: 220ms cubic-bezier(.4,0,.2,1);
  }

  html { font-family: var(--sans); background: var(--bg); color: var(--text); }

  body {
    min-height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr;
  }

  /* ── Header ── */
  header {
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 60px;
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
  }
  .logo-mark {
    width: 32px; height: 32px;
    background: var(--accent);
    border-radius: 8px;
    display: grid; place-items: center;
    font-family: var(--mono);
    font-size: 14px; font-weight: 700;
    color: #fff; flex-shrink: 0;
  }
  header h1 { font-family: var(--mono); font-size: 15px; letter-spacing: .5px; }
  header span { color: var(--muted); font-size: 13px; margin-left: auto; font-family: var(--mono); }

  /* ── Layout ── */
  main {
    display: grid;
    grid-template-columns: 380px 1fr;
    height: calc(100vh - 60px);
    overflow: hidden;
  }

  /* ── Left panel ── */
  .panel-left {
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
    background: var(--surface);
  }
  .panel-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .panel-header h2 { font-size: 13px; font-weight: 600; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
  .feeds-list { flex: 1; overflow-y: auto; padding: 8px; }
  .feeds-list::-webkit-scrollbar { width: 4px; }
  .feeds-list::-webkit-scrollbar-track { background: transparent; }
  .feeds-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* ── Feed card ── */
  .feed-card {
    padding: 14px 16px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: background var(--transition);
    border: 1px solid transparent;
    margin-bottom: 4px;
    display: flex; align-items: center; gap: 12px;
  }
  .feed-card:hover { background: var(--surface2); }
  .feed-card.active { background: var(--surface2); border-color: var(--border); }
  .feed-icon {
    width: 36px; height: 36px; border-radius: 8px;
    display: grid; place-items: center; flex-shrink: 0;
    font-size: 16px;
  }
  .feed-icon.status-pending  { background: rgba(245,158,11,.12); }
  .feed-icon.status-processing { background: rgba(99,102,241,.12); animation: pulse 1.5s infinite; }
  .feed-icon.status-done     { background: rgba(34,197,94,.12); }
  .feed-icon.status-error    { background: rgba(255,59,59,.12); }

  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.5; } }

  .feed-info { flex: 1; min-width: 0; }
  .feed-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .feed-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }

  .status-badge {
    font-size: 11px; font-family: var(--mono); padding: 3px 8px;
    border-radius: 6px; white-space: nowrap; flex-shrink: 0;
  }
  .status-badge.pending    { background: rgba(245,158,11,.15); color: var(--yellow); }
  .status-badge.processing { background: rgba(99,102,241,.15); color: #818cf8; }
  .status-badge.done       { background: rgba(34,197,94,.15);  color: var(--green); }
  .status-badge.error      { background: rgba(255,59,59,.15);  color: var(--accent); }

  .empty-state {
    text-align: center; padding: 60px 24px; color: var(--muted);
  }
  .empty-state .icon { font-size: 48px; display: block; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; line-height: 1.6; }

  /* ── Right panel ── */
  .panel-right {
    display: flex; flex-direction: column;
    overflow-y: auto; padding: 32px;
    gap: 28px;
  }
  .panel-right::-webkit-scrollbar { width: 4px; }
  .panel-right::-webkit-scrollbar-track { background: transparent; }
  .panel-right::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* ── Cards ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
  }
  .card-title {
    font-size: 12px; font-weight: 600; color: var(--muted);
    letter-spacing: 1px; text-transform: uppercase; margin-bottom: 20px;
    display: flex; align-items: center; gap: 8px;
  }
  .card-title::before {
    content: ''; display: block; width: 3px; height: 14px;
    background: var(--accent); border-radius: 2px;
  }

  /* ── Form elements ── */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-group { display: flex; flex-direction: column; gap: 8px; }
  .form-group.full { grid-column: 1 / -1; }

  label { font-size: 12px; color: var(--muted); font-weight: 500; letter-spacing: .3px; }

  input[type=text], input[type=number], select {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    padding: 10px 12px;
    outline: none;
    transition: border-color var(--transition);
    width: 100%;
  }
  input:focus, select:focus { border-color: var(--accent); }
  select option { background: var(--surface2); }

  /* Color picker row */
  .color-row { display: flex; gap: 8px; align-items: center; }
  .color-row input[type=color] {
    width: 40px; height: 40px; padding: 2px; border-radius: 8px;
    background: var(--bg); border: 1px solid var(--border);
    cursor: pointer; flex-shrink: 0;
  }
  .color-row input[type=text] { flex: 1; font-family: var(--mono); }

  /* Upload zone */
  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 32px;
    text-align: center;
    cursor: pointer;
    transition: all var(--transition);
    position: relative;
  }
  .upload-zone:hover, .upload-zone.drag { border-color: var(--accent); background: rgba(255,59,59,.04); }
  .upload-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .upload-zone .upload-icon { font-size: 32px; margin-bottom: 8px; }
  .upload-zone p { font-size: 14px; color: var(--muted); }
  .upload-zone strong { color: var(--text); }
  .upload-zone .file-name { margin-top: 8px; font-family: var(--mono); font-size: 12px; color: var(--accent); }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 11px 20px; border-radius: 8px; border: none;
    font-family: var(--sans); font-size: 14px; font-weight: 500;
    cursor: pointer; transition: all var(--transition);
    text-decoration: none;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #e02d2d; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { background: var(--border); }
  .btn-danger { background: transparent; color: var(--accent); border: 1px solid var(--accent); }
  .btn-danger:hover { background: rgba(255,59,59,.1); }
  .btn-ghost { background: transparent; color: var(--muted); }
  .btn-ghost:hover { color: var(--text); }
  .btn:disabled { opacity: .4; cursor: not-allowed; pointer-events: none; }
  .btn-sm { padding: 7px 14px; font-size: 13px; }

  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 4px; }

  /* Progress */
  .progress-block {
    background: var(--surface2); border-radius: 10px; padding: 16px 20px;
    display: flex; align-items: center; gap: 14px;
  }
  .progress-spinner {
    width: 20px; height: 20px; border: 2px solid var(--border);
    border-top-color: #818cf8; border-radius: 50%;
    animation: spin .8s linear infinite; flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .progress-text { font-size: 14px; }

  /* Detail view */
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .detail-item label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .detail-item span {
    font-size: 13px; font-family: var(--mono);
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; padding: 6px 10px; display: block;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .color-preview {
    display: inline-block; width: 12px; height: 12px;
    border-radius: 3px; margin-right: 6px; vertical-align: middle;
  }

  /* Welcome screen */
  .welcome {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 60vh; text-align: center; gap: 12px;
  }
  .welcome .big-icon { font-size: 64px; }
  .welcome h2 { font-size: 20px; font-weight: 500; }
  .welcome p { color: var(--muted); font-size: 14px; max-width: 340px; line-height: 1.6; }

  /* Toast */
  #toast {
    position: fixed; bottom: 24px; right: 24px; z-index: 999;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 18px;
    font-size: 14px; max-width: 320px;
    transform: translateY(100px); opacity: 0;
    transition: all .3s; pointer-events: none;
  }
  #toast.show { transform: translateY(0); opacity: 1; }
  #toast.success { border-left: 3px solid var(--green); }
  #toast.error   { border-left: 3px solid var(--accent); }

  /* Stats grid */
  .stats-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
  }
  @media (max-width: 900px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }
  .stat-box {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 16px; text-align: center;
  }
  .stat-box.success { border-color: rgba(34,197,94,.3); }
  .stat-box.warn    { border-color: rgba(245,158,11,.3); }
  .stat-value {
    font-family: var(--mono); font-size: 28px; font-weight: 700;
    color: var(--text); line-height: 1;
  }
  .stat-box.success .stat-value { color: var(--green); }
  .stat-box.warn    .stat-value { color: var(--yellow); }
  .stat-label { font-size: 11px; color: var(--muted); margin-top: 6px; }

  /* ── Detail tabs ── */
  .detail-tabs {
    display: flex; gap: 2px;
    background: var(--surface); 
    padding: 8px 8px 0;
    border-bottom: 2px solid var(--border);
    margin-bottom: 20px;
    position: sticky; top: 0; z-index: 10;
  }
  .detail-tab {
    padding: 10px 20px; border-radius: 8px 8px 0 0;
    border: none; cursor: pointer; font-size: 13px; font-weight: 600;
    background: transparent; color: var(--muted);
    display: flex; align-items: center; gap: 7px;
    transition: all var(--transition);
    border-bottom: 2px solid transparent; margin-bottom: -2px;
    letter-spacing: .2px;
  }
  .detail-tab:hover { color: var(--text); background: var(--surface2); }
  .detail-tab.active {
    color: var(--text);
    background: var(--surface2);
    border-bottom: 2px solid var(--accent);
  }
  .log-badge {
    font-size: 10px; background: var(--accent); color: #fff;
    border-radius: 10px; padding: 1px 6px; font-weight: 700;
    min-width: 18px; text-align: center;
  }
  .detail-tab.tab-disabled {
    opacity: .4; cursor: not-allowed;
  }
  .detail-tab.tab-disabled:hover { background: transparent; color: var(--muted); }
  .log-live-pill {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 10px; color: #4ade80;
    background: rgba(74,222,128,.12); border-radius: 8px;
    padding: 1px 6px; margin-left: 2px;
  }

  .detail-tab-pane { display: none; }
  .detail-tab-pane.active { display: block; }

  /* ── Log container ── */
  .log-container {
    max-height: 600px; overflow-y: auto;
    font-family: var(--mono); font-size: 12px;
  }
  .log-empty {
    padding: 40px 20px; text-align: center;
    color: var(--muted); font-family: var(--font);
  }
  .log-row {
    display: grid; grid-template-columns: 130px 22px 1fr;
    gap: 10px; align-items: baseline;
    padding: 9px 20px 9px 16px;
    border-bottom: 1px solid var(--border);
    border-left: 3px solid transparent;
    transition: background var(--transition);
  }
  .log-row:hover { background: var(--surface2); }
  .log-row:last-child { border-bottom: none; }
  .log-row:first-child { border-top: none; }
  .log-ts { color: var(--muted); font-size: 11px; white-space: nowrap; }
  .log-icon { text-align: center; font-size: 13px; }
  .log-msg { color: var(--text); word-break: break-word; line-height: 1.5; }

  .log-info   { border-left-color: #3b82f6; }
  .log-info   .log-msg { color: var(--text); }
  .log-success { border-left-color: #4ade80; }
  .log-success .log-msg { color: #4ade80; }
  .log-warning { border-left-color: #fbbf24; }
  .log-warning .log-msg { color: #fbbf24; }
  .log-error  { border-left-color: var(--accent); }
  .log-error  .log-msg { color: var(--accent); }
  .log-ts { color: var(--muted); }

  /* Live log indicator */
  .log-live-badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 11px; color: #4ade80;
    background: rgba(74,222,128,.1); border-radius: 6px;
    padding: 2px 8px;
  }
  .log-live-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #4ade80; animation: blink 1s ease-in-out infinite;
  }

  .feed-progress-row {
    display: flex; align-items: center; gap: 8px;
    margin-top: 5px;
  }
  .feed-progress-bar {
    flex: 1; height: 4px; background: var(--border);
    border-radius: 2px; overflow: hidden;
    min-width: 60px;
  }
  .feed-progress-fill {
    height: 100%; background: #818cf8;
    border-radius: 2px;
    transition: width .4s ease;
  }
  .feed-progress-label {
    font-size: 11px; color: #818cf8;
    font-family: var(--mono); white-space: nowrap;
    font-weight: 600;
  }

  /* Processing timer in feed card */
  .processing-meta {
    display: inline-flex; align-items: center; gap: 5px;
    color: #818cf8; font-size: 12px;
  }
  .processing-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #818cf8; flex-shrink: 0;
    animation: blink 1.2s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
  .processing-timer {
    font-family: var(--mono); font-size: 12px;
    color: #818cf8; font-weight: 700; letter-spacing: .5px;
    background: rgba(129,140,248,.12); border-radius: 4px;
    padding: 1px 5px;
  }
  .mini-spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(129,140,248,.2);
    border-top-color: #818cf8;
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }

  /* Feed card progress bar */
  .feed-progress-row {
    display: flex; align-items: center; gap: 8px;
    margin-top: 6px;
  }
  .feed-progress-bar {
    flex: 1; height: 4px; background: var(--border);
    border-radius: 4px; overflow: hidden;
  }
  .feed-progress-fill {
    height: 100%; background: #818cf8;
    border-radius: 4px;
    transition: width .4s ease;
    min-width: 4px;
  }
  .feed-progress-label {
    font-family: var(--mono); font-size: 11px;
    color: #818cf8; white-space: nowrap; font-weight: 600;
    min-width: 60px; text-align: right;
  }

  /* Steps navigation */
  .steps-nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 0 18px; flex-wrap: wrap; gap: 10px;
  }
  .step-back {
    background: none; border: 1px solid var(--border); border-radius: 8px;
    color: var(--muted); font-size: 13px; padding: 6px 14px;
    cursor: pointer; transition: all var(--transition);
  }
  .step-back:hover { color: var(--text); border-color: var(--text); }
  .steps-indicator {
    display: flex; align-items: center; gap: 6px; font-size: 12px;
  }
  .step { color: var(--muted); padding: 4px 10px; border-radius: 6px; }
  .step.done { color: #4ade80; }
  .step.active {
    color: var(--text); background: var(--surface2);
    font-weight: 700; border: 1px solid var(--border);
  }
  .step-arrow { color: var(--border); font-size: 14px; }

  /* Corner position picker */
  .corner-picker {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 6px; width: 100px; margin-top: 4px;
  }
  .corner-btn {
    width: 44px; height: 44px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--bg);
    color: var(--muted); font-size: 18px; cursor: pointer;
    transition: all var(--transition);
    display: flex; align-items: center; justify-content: center;
  }
  .corner-btn:hover { border-color: var(--accent); color: var(--text); }
  .corner-btn.active {
    border-color: var(--accent); background: rgba(255,59,59,.12);
    color: var(--accent); font-weight: 700;
  }

  /* Style picker grid */
  .style-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 8px;
  }
  @media (max-width: 900px) { .style-grid { grid-template-columns: repeat(2,1fr); } }
  .style-card {
    border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px;
    cursor: pointer; transition: all var(--transition);
    display: flex; flex-direction: column; gap: 2px;
    background: var(--bg);
  }
  .style-card:hover { border-color: var(--accent); background: var(--surface2); }
  .style-card.active { border-color: var(--accent); background: var(--surface2);
    box-shadow: 0 0 0 2px rgba(255,59,59,.2); }
  .style-icon { font-size: 18px; }
  .style-name { font-size: 13px; font-weight: 600; color: var(--text); }
  .style-desc { font-size: 11px; color: var(--muted); }

  /* Preview block */
  .preview-wrap {
    position: relative; border-radius: 12px; overflow: hidden;
    background: var(--bg); border: 1px solid var(--border);
    min-height: 200px; display: flex; align-items: center; justify-content: center;
  }
  .preview-wrap img {
    width: 100%; max-height: 420px; object-fit: contain;
    display: block; border-radius: 12px;
    transition: opacity .3s;
  }
  .preview-wrap img.loading { opacity: 0.3; }
  .preview-badge {
    position: absolute; top: 10px; left: 10px;
    background: rgba(0,0,0,.65); backdrop-filter: blur(6px);
    border-radius: 6px; padding: 4px 10px;
    font-size: 11px; font-family: var(--mono); color: #fff;
  }
  .preview-empty {
    text-align: center; color: var(--muted); padding: 40px; font-size: 14px;
  }
  .preview-empty .icon { font-size: 40px; display: block; margin-bottom: 8px; }

  /* Toggle switch */
  .toggle { position: relative; display: inline-block; width: 44px; height: 24px; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-slider {
    position: absolute; inset: 0; background: var(--border);
    border-radius: 24px; cursor: pointer; transition: background var(--transition);
  }
  .toggle-slider::before {
    content: ''; position: absolute;
    width: 18px; height: 18px; left: 3px; top: 3px;
    background: #fff; border-radius: 50%;
    transition: transform var(--transition);
  }
  .toggle input:checked + .toggle-slider { background: var(--green); }
  .toggle input:checked + .toggle-slider::before { transform: translateX(20px); }

  /* Public URL box */
  .public-url-box {
    display: flex; align-items: center; gap: 10px;
    background: var(--bg); border: 1px solid var(--green);
    border-radius: 8px; padding: 10px 14px;
  }
  .public-url-box span {
    font-family: var(--mono); font-size: 12px; color: var(--green);
    flex: 1; word-break: break-all;
  }

  /* Divider */
  hr { border: none; border-top: 1px solid var(--border); margin: 4px 0; }

  /* ── Source tabs (Файл / URL) ── */
  .tab-row {
    display: flex; gap: 4px;
    background: var(--bg); border-radius: 10px; padding: 4px;
    border: 1px solid var(--border); margin-bottom: 20px;
  }
  .tab-btn {
    flex: 1; padding: 8px 12px; border: none; border-radius: 7px;
    background: transparent; color: var(--muted);
    font-family: var(--sans); font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all var(--transition);
  }
  .tab-btn.active { background: var(--surface2); color: var(--text); }
  .tab-pane { display: none; }
  .tab-pane.active { display: block; }

  /* URL source badge */
  .source-url-badge {
    display: flex; align-items: center; gap: 8px;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 12px;
    font-family: var(--mono); font-size: 12px; color: var(--muted);
    word-break: break-all;
  }
  .source-url-badge span { color: var(--text); flex: 1; }
  .last-fetched { font-size: 11px; color: var(--muted); margin-top: 6px; }

  @media (max-width: 768px) {
    main { grid-template-columns: 1fr; }
    .panel-left { height: auto; max-height: 40vh; }
    .panel-right { padding: 20px; }
    .form-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-mark">FE</div>
  <h1>Feed Enhancer</h1>
  <span id="server-status">● live</span>
</header>

<main>
  <!-- ═══ LEFT: список фідів ═══ -->
  <aside class="panel-left">
    <div class="panel-header">
      <h2>Фіди</h2>
      <button class="btn btn-primary btn-sm" onclick="showAddPanel()">+ Додати</button>
    </div>
    <div class="feeds-list" id="feeds-list">
      <div class="empty-state">
        <span class="icon">📂</span>
        <p>Фідів ще немає.<br>Натисни <strong>+ Додати</strong>, щоб завантажити перший XML.</p>
      </div>
    </div>
  </aside>

  <!-- ═══ RIGHT: деталі / форма додавання ═══ -->
  <section class="panel-right" id="panel-right">
    <div class="welcome">
      <div class="big-icon">🚀</div>
      <h2>Почни з додавання фіду</h2>
      <p>Завантаж XML фід Google Merchant або Meta Catalog. Сервіс обведе зображення рамкою та додасть бейдж ціни.</p>
      <button class="btn btn-primary" style="margin-top:8px" onclick="showAddPanel()">Додати перший фід</button>
    </div>
  </section>
</main>

<div id="toast"></div>

<script>
// ─────────────────────────────────────────────────────────
// State
// ─────────────────────────────────────────────────────────
let feeds     = [];
let activeFeedId = null;
let pollTimer = null;

// ─────────────────────────────────────────────────────────
// API helpers
// ─────────────────────────────────────────────────────────
async function api(method, path, body) {
  const opts = { method, headers: {} };
  if (body instanceof FormData) {
    opts.body = body;
  } else if (body) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  }
  const r = await fetch(path, opts);
  if (!r.ok) {
    const err = await r.json().catch(() => ({ error: r.statusText }));
    throw new Error(err.error || r.statusText);
  }
  return r.headers.get('content-type')?.includes('json') ? r.json() : r;
}

// ─────────────────────────────────────────────────────────
// Toast
// ─────────────────────────────────────────────────────────
function toast(msg, type = 'success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `show ${type}`;
  clearTimeout(el._t);
  el._t = setTimeout(() => el.className = '', 3500);
}

// ─────────────────────────────────────────────────────────
// Render feeds list
// ─────────────────────────────────────────────────────────
const statusEmoji = { pending:'⏳', processing:'⚙️', done:'✅', error:'❌' };
const statusLabel = { pending:'очікує', processing:'обробка', done:'готово', error:'помилка' };

// ─────────────────────────────────────────────────────────
// Processing timer
// ─────────────────────────────────────────────────────────
const processingStartTimes = {}; // feed_id → Date коли почалась обробка
let timerInterval = null;

function startTimers() {
  if (timerInterval) return;
  timerInterval = setInterval(updateTimers, 1000);
}

function stopTimers() {
  clearInterval(timerInterval);
  timerInterval = null;
}

function updateTimers() {
  feeds.forEach(f => {
    if (f.status !== 'processing') return;
    const el = document.getElementById(`timer-${f.id}`);
    if (!el) return;
    if (!processingStartTimes[f.id]) processingStartTimes[f.id] = Date.now();
    const sec = Math.floor((Date.now() - processingStartTimes[f.id]) / 1000);
    const m = Math.floor(sec / 60).toString().padStart(2,'0');
    const s = (sec % 60).toString().padStart(2,'0');
    el.textContent = `${m}:${s}`;
  });
}

function renderList() {
  const el = document.getElementById('feeds-list');
  if (!feeds.length) {
    el.innerHTML = `<div class="empty-state"><span class="icon">📂</span>
      <p>Фідів ще немає.<br>Натисни <strong>+ Додати</strong>.</p></div>`;
    stopTimers();
    return;
  }

  const hasProcessing = feeds.some(f => f.status === 'processing');

  el.innerHTML = feeds.map(f => {
    // Скидаємо таймер якщо фід більше не обробляється
    if (f.status !== 'processing') delete processingStartTimes[f.id];

    const isProcessing = f.status === 'processing';
    const cur   = f.progress_current || 0;
    const total = f.progress_total   || 0;
    const pct   = (total > 0) ? Math.round(cur / total * 100) : 0;

    return `
    <div class="feed-card ${f.id === activeFeedId ? 'active' : ''}"
         onclick="selectFeed('${f.id}')">
      <div class="feed-icon status-${f.status}">
        ${isProcessing
          ? `<div class="mini-spinner"></div>`
          : (statusEmoji[f.status] || '📄')
        }
      </div>
      <div class="feed-info">
        <div class="feed-name">${esc(f.name)}</div>
        <div class="feed-meta">
          ${isProcessing
            ? `<span class="processing-meta">
                <span class="processing-dot"></span>обробка
                <span class="processing-timer" id="timer-${f.id}">00:00</span>
               </span>`
            : formatDate(f.created_at)
          }
        </div>
        ${isProcessing && total > 0 ? `
        <div class="feed-progress-row">
          <div class="feed-progress-bar">
            <div class="feed-progress-fill" id="prog-fill-${f.id}"
                 style="width:${pct}%"></div>
          </div>
          <span class="feed-progress-label" id="prog-label-${f.id}">${cur} / ${total}</span>
        </div>` : ''}
      </div>
      <span class="status-badge ${f.status}">${statusLabel[f.status] || f.status}</span>
    </div>`;
  }).join('');

  if (hasProcessing) startTimers();
  else stopTimers();
}

// ─────────────────────────────────────────────────────────
// Load feeds
// ─────────────────────────────────────────────────────────
async function loadFeeds() {
  try {
    feeds = await api('GET', '/api/feeds');
    renderList();
    if (activeFeedId) renderDetail(feeds.find(f => f.id === activeFeedId));
  } catch(e) { console.error(e); }
}

// ─────────────────────────────────────────────────────────
// Select feed → show detail
// ─────────────────────────────────────────────────────────
function selectFeed(id) {
  const isNewFeed = activeFeedId !== id; // чи вибираємо інший фід
  activeFeedId = id;
  renderList();
  const feed = feeds.find(f => f.id === id);
  if (!feed) return;

  // Визначаємо вкладку тільки якщо це новий фід (не поточний)
  if (isNewFeed) {
    if (feed.status === 'processing') {
      activeDetailTab = 'logs';    // іде обробка → логи
    } else if (feed.status === 'done') {
      activeDetailTab = 'info';    // готовий → інфо зі статистикою і URL
    } else {
      activeDetailTab = 'info';    // новий/помилка → інфо
    }
  }

  renderDetail(feed);
}

let activeDetailTab = 'info';

function renderDetail(feed) {
  if (!feed) return;
  const cfg        = feed.config   || {};
  const sched      = feed.schedule || {};
  const right      = document.getElementById('panel-right');

        📄 Налаштування фіду
      </button>
      <button class="detail-tab ${activeDetailTab==='design'?'active':''} ${isProc?'tab-disabled':''}"
              onclick="${isProc ? 'tabBlockedToast()' : `switchDetailTab('design','${feed.id}')`}">
        🎨 Зовнішній вигляд
      </button>
      <button class="detail-tab ${activeDetailTab==='logs'?'active':''}"
              onclick="switchDetailTab('logs','${feed.id}')">
        📋 Генерація
        ${logs.length ? `<span class="log-badge">${logs.length}</span>` : ''}
        ${isProc ? `<span class="log-live-pill"><span class="log-live-dot"></span>live</span>` : ''}
      </button>
    </div>

    <!-- ══════════════ ВКЛАДКА 1: НАЛАШТУВАННЯ ФІДУ ══════════════ -->
    <div id="tab-info" class="detail-tab-pane ${activeDetailTab==='info'?'active':''}">

      <!-- Індикатор кроків -->
      <div class="steps-nav" style="justify-content:flex-end">
        <div class="steps-indicator">
          <span class="step active">1. Фід</span>
          <span class="step-arrow">›</span>
          <span class="step">2. Оформлення</span>
          <span class="step-arrow">›</span>
          <span class="step">3. Генерація</span>
        </div>
      </div>

      <div class="card">
        <div class="card-title">Інформація про фід</div>
        <div class="detail-grid">
          <div class="detail-item"><label>Назва</label><span>${esc(feed.name)}</span></div>
          <div class="detail-item"><label>ID</label><span>${feed.id}</span></div>
          <div class="detail-item"><label>Джерело</label><span>${isUrl ? '🔗 URL' : '📄 Файл'}</span></div>
          <div class="detail-item"><label>Статус</label>
            <span><span class="status-badge ${feed.status}">${statusLabel[feed.status]}</span></span>
          </div>
          <div class="detail-item"><label>Створено</label><span>${formatDate(feed.created_at)}</span></div>
          ${feed.finished_at ? `<div class="detail-item"><label>Оброблено</label><span>${formatDate(feed.finished_at)}</span></div>` : ''}
        </div>
        ${isUrl ? `
        <div style="margin-top:16px">
          <label style="font-size:11px;color:var(--muted);display:block;margin-bottom:6px">URL джерела</label>
          <div class="source-url-badge"><span>🔗</span><span>${esc(feed.source_url)}</span></div>
          ${feed.last_fetched ? `<div class="last-fetched">Останнє завантаження: ${formatDate(feed.last_fetched)}</div>` : ''}
        </div>` : ''}
      </div>

      ${feed.stats ? `
      <div class="card">
        <div class="card-title">Статистика обробки</div>
        <div class="stats-grid">
          <div class="stat-box"><div class="stat-value">${feed.stats.total}</div><div class="stat-label">Всього</div></div>
          <div class="stat-box success"><div class="stat-value">${feed.stats.success}</div><div class="stat-label">Оброблено</div></div>
          <div class="stat-box ${feed.stats.skipped>0?'warn':''}"><div class="stat-value">${feed.stats.skipped}</div><div class="stat-label">Пропущено</div></div>
          <div class="stat-box"><div class="stat-value">${feed.stats.total>0?Math.round(feed.stats.success/feed.stats.total*100):0}%</div><div class="stat-label">Успішно</div></div>
        </div>
      </div>` : ''}

      ${feed.public_url ? `
      <div class="card">
        <div class="card-title">Публічний URL фіду</div>
        <p style="font-size:13px;color:var(--muted);margin-bottom:14px">
          Вставляй цей URL напряму в Google Merchant Center або Meta Catalog.
        </p>
        <div class="public-url-box">
          <span id="pub-url-text">${esc(feed.public_url)}</span>
          <button class="btn btn-secondary btn-sm" onclick="copyPublicUrl()">📋 Копіювати</button>
        </div>
        <div class="btn-row" style="margin-top:10px">
          <a class="btn btn-ghost btn-sm" href="${feed.public_url}" target="_blank">🔗 Відкрити</a>

      ${isUrl ? `

        <p style="font-size:13px;color:var(--muted);margin-bottom:20px">

        <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px">

                       padding:8px 14px;outline:none;width:140px;cursor:pointer">

            </div>
          </div>
          <div style="display:flex;align-items:center;gap:12px">
            <span style="font-size:13px;color:var(--muted)">Увімкнено</span>

              <input type="checkbox" id="d-sched-enabled" ${sched.enabled?'checked':''}>

        ${sched.enabled ? `<div style="margin-top:14px;display:flex;align-items:center;gap:8px">
          <span style="font-size:12px;color:var(--green)">● Активне</span>
          <span style="font-size:12px;color:var(--muted)">— щодня о ${sched.run_time||'06:00'}</span>
        </div>` : ''}
        ${sched.last_run ? `<p style="font-size:12px;color:var(--muted);margin-top:6px">Останнє: ${formatDate(sched.last_run)}</p>` : ''}
      </div>` : ''}

      <div class="card" style="border:1px solid rgba(129,140,248,.3);background:rgba(129,140,248,.04)">
        <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px">
          <div>
            <div style="font-weight:700;font-size:14px;margin-bottom:4px">Крок 2 — Налаштування оформлення</div>
            <div style="font-size:13px;color:var(--muted)">Оберіть стиль банерів, колір, домен і зробіть превʼю</div>
          </div>
          <button class="btn btn-primary" onclick="switchDetailTab('design','${feed.id}')">
            🎨 Налаштувати вигляд →
          </button>
        </div>
      </div>

      <div class="card">
        <div class="card-title">Небезпечна зона</div>
        <p style="font-size:13px;color:var(--muted);margin-bottom:16px">Видалення фіду незворотнє.</p>
        <button class="btn btn-danger btn-sm" onclick="deleteFeed('${feed.id}')">🗑 Видалити фід</button>
      </div>

    </div><!-- /tab-info -->

    <!-- ══════════════ ВКЛАДКА 2: ЗОВНІШНІЙ ВИГЛЯД ══════════════ -->
    <div id="tab-design" class="detail-tab-pane ${activeDetailTab==='design'?'active':''}">

      <!-- Навігація кроків -->
      <div class="steps-nav">
        <button class="step-back" onclick="switchDetailTab('info','${feed.id}')">
          ← Назад до фіду
        </button>
        <div class="steps-indicator">
          <span class="step done">1. Фід</span>
          <span class="step-arrow">›</span>
          <span class="step active">2. Оформлення</span>
          <span class="step-arrow">›</span>
          <span class="step">3. Генерація</span>
        </div>
      </div>

      <div class="card">
        <div class="card-title">Стиль банера</div>
        <div class="style-grid">
          ${[
            ['classic',  '🔲', 'Classic',  'Класична рамка + бейдж'],
            ['neon',     '⚡', 'Neon',     'Glow-ефект + неонова смуга'],
            ['luxury',   '✨', 'Luxury',   'Золота рамка + темна смуга'],
            ['minimal',  '◻️', 'Minimal',  'Тонка рамка + кути'],
            ['gradient', '🌈', 'Gradient', 'Градієнтна рамка і смуга'],
            ['dark',     '🌑', 'Dark',     'Dark mode + акцент'],
          ].map(([val,icon,name,desc]) => `
            <div class="style-card ${(cfg.banner_style||'classic')===val?'active':''}"
                 onclick="selectStyle('${val}', this)">
              <span class="style-icon">${icon}</span>
              <span class="style-name">${name}</span>
              <span class="style-desc">${desc}</span>

              <input type="color" id="d-border-color" value="${cfg.border_color||'#FF0000'}"

              <input type="text" id="d-border-color-text" value="${cfg.border_color||'#FF0000'}" maxlength="7"
                     oninput="document.getElementById('d-border-color').value=this.value">
            </div>
          </div>
          <div class="form-group">
            <label>Товщина рамки (px)</label>
            <input type="number" id="d-border-width" value="${cfg.border_width||14}" min="1" max="60">
          </div>
          <div class="form-group">
            <label>Розмір шрифту ціни (px)</label>
            <input type="number" id="d-badge-font-size" value="${cfg.badge_font_size||40}" min="16" max="120">
          </div>
          <div class="form-group">
            <label>Позиція ціни</label>
            <div class="corner-picker" id="price-corner-picker">
              ${[['top-left','↖'],['top-right','↗'],['bottom-left','↙'],['bottom-right','↘']].map(([val,arrow])=>`
                <button type="button"
                  class="corner-btn ${(cfg.badge_position||'bottom-right')===val?'active':''}"
                  onclick="selectCorner('badge_position','${val}',this)"
                  title="${val}">${arrow}</button>

            </div>
            <input type="hidden" id="d-badge-position" value="${cfg.badge_position||'bottom-right'}">
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">Домен на банері</div>
        <div class="form-grid">
          <div class="form-group full">
            <label>Домен сайту</label>
            <input type="text" id="d-domain" value="${cfg.domain||''}" placeholder="наприклад: myshop.com">

              Якщо порожньо — береться автоматично з URL фіду
            </span>
          </div>
          <div class="form-group">
            <label>Позиція домену</label>
            <div class="corner-picker">
              ${[['top-left','↖'],['top-right','↗'],['bottom-left','↙'],['bottom-right','↘']].map(([val,arrow])=>`
                <button type="button"
                  class="corner-btn ${(cfg.domain_position||'bottom-left')===val?'active':''}"
                  onclick="selectCorner('domain_position','${val}',this)"
                  title="${val}">${arrow}</button>
              `).join('')}
            </div>
            <input type="hidden" id="d-domain-position" value="${cfg.domain_position||'bottom-left'}">
          </div>
        </div>
      </div>

      <!-- Превʼю одного товару -->
      <div class="card">
        <div class="card-title">Превʼю банера</div>
        <p style="font-size:13px;color:var(--muted);margin-bottom:16px">
          Обробіть один випадковий товар щоб побачити як виглядатиме банер з поточними налаштуваннями.
        </p>

        <div id="preview-wrap" class="preview-wrap">
          <div class="preview-empty"><span class="icon">🎨</span>Натисни кнопку щоб згенерувати превʼю</div>
        </div>

        <div class="btn-row" style="margin-top:14px">
          <button class="btn btn-secondary" id="btn-preview-one"
                  onclick="previewOne('${feed.id}')">
            👁 Згенерувати превʼю
          </button>
          ${isDone ? `
          <button class="btn btn-ghost btn-sm" onclick="loadPreview('${feed.id}')">
            🔀 Інший з готових
          </button>` : ''}
          <span id="preview-counter" style="font-size:12px;color:var(--muted);align-self:center"></span>
        </div>

      <!-- Запуск повної генерації -->
      <div class="card" style="border:1px solid rgba(129,140,248,.3);background:rgba(129,140,248,.04)">
        <div class="steps-indicator" style="margin-bottom:12px">
          <span class="step done">1. Фід ✓</span>
          <span class="step-arrow">›</span>
          <span class="step done">2. Оформлення ✓</span>
          <span class="step-arrow">›</span>
          <span class="step active">3. Генерація</span>
        </div>
        <div class="card-title" style="color:#818cf8">Запустити генерацію фіду</div>
        <p style="font-size:13px;color:var(--muted);margin-bottom:18px">
          Після запуску всі товари будуть оброблені з поточними налаштуваннями.
          Відкриється вкладка Генерація де можна стежити за прогресом або зупинити.
        </p>
        <div class="btn-row">
          ${isUrl
            ? `<button class="btn btn-primary" onclick="refreshFeed('${feed.id}')">
                 🚀 Оновити з URL і запустити генерацію
               </button>
               <button class="btn btn-secondary" onclick="reprocess('${feed.id}')">
                 ▶ Генерувати без оновлення XML
               </button>`
            : `<button class="btn btn-primary" onclick="reprocess('${feed.id}')">
                 🚀 Запустити генерацію фіду
               </button>`
          }
        </div>
      </div>

// ─────────────────────────────────────────────────────────
// Preview

async function loadPreview(feedId) {
  const wrap    = document.getElementById('preview-wrap');
  const counter = document.getElementById('preview-counter');
  if (!wrap) return;

  // Показуємо спіннер
  wrap.innerHTML = `
    <div class="preview-empty">
      <div style="width:32px;height:32px;border:3px solid var(--border);border-top-color:#818cf8;
                  border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px"></div>
      Завантаження...
    </div>`;

  try {
    const data = await api('GET', `/api/feeds/${feedId}/preview`);

    wrap.innerHTML = `
      <img id="preview-img" src="${data.image_url}"
           alt="Preview"
           onload="this.classList.remove('loading')"
           onerror="document.getElementById('preview-wrap').innerHTML='<div class=\\'preview-empty\\'><span class=\\'icon\\'>❌</span>Не вдалося завантажити зображення</div>'"
           class="loading">
      <div class="preview-badge">Банер</div>
    `;

    if (counter) counter.textContent = `${data.total} банерів у фіді`;

  } catch(e) {
    wrap.innerHTML = `<div class="preview-empty"><span class="icon">⚠️</span>${esc(e.message)}</div>`;
  }
}

// ─────────────────────────────────────────────────────────
// Polling
// ─────────────────────────────────────────────────────────
function startPolling(id) {
  stopPolling();
  // Переходимо на вкладку логів при старті обробки
  activeDetailTab = 'logs';
  const feed = feeds.find(f => f.id === id);
  if (feed) renderDetail(feed);
  pollTimer = setInterval(async () => {
    try {
      const s = await api('GET', `/api/feeds/${id}/status`);
      const idx = feeds.findIndex(f => f.id === id);
      if (idx !== -1) {
        feeds[idx].status            = s.status;
        feeds[idx].progress          = s.progress;
        feeds[idx].finished_at       = s.finished_at;
        feeds[idx].progress_current  = s.progress_current || 0;
        feeds[idx].progress_total    = s.progress_total   || 0;
        feeds[idx].progress_success  = s.progress_success || 0;
        feeds[idx].progress_skipped  = s.progress_skipped || 0;
        if (s.stats)      feeds[idx].stats      = s.stats;
        if (s.public_url) feeds[idx].public_url = s.public_url;
        if (s.logs)       feeds[idx].logs        = s.logs;
      }

      // Оновлюємо прогрес-бар у картці списку
      const cur   = feeds[idx]?.progress_current || 0;
      const total = feeds[idx]?.progress_total   || 0;
      const pct   = total > 0 ? Math.round(cur / total * 100) : 0;
      const fill  = document.getElementById(`prog-fill-${id}`);
      const label = document.getElementById(`prog-label-${id}`);
      if (fill)  fill.style.width = `${pct}%`;
      if (label) label.textContent = `${cur} / ${total}`;

      // Оновлюємо великий прогрес-бар на вкладці логів
      const detailFill  = document.getElementById('prog-detail-fill');
      const detailLabel = document.getElementById('prog-detail-label');
      if (detailFill)  detailFill.style.width = `${pct}%`;
      if (detailLabel) detailLabel.textContent = `${cur} / ${total}`;

      // Якщо прогрес-рядка ще немає — перемальовуємо список
      if (total > 0 && !document.getElementById(`prog-fill-${id}`)) {
        renderList();
      }

      if (activeFeedId === id) {
        if (activeDetailTab === 'logs') {
          updateLogContainer(feeds[idx]);
        } else if (activeDetailTab === 'design') {
          // НЕ перемальовуємо design — це скине превʼю зображення
        } else {
          renderDetail(feeds[idx]);
        }
      }

      if (s.status !== 'processing') {
        stopPolling();
        renderList();
        if (s.status === 'done') {
          toast('✅ Фід успішно оброблено!');
          activeDetailTab = 'info';
          if (activeFeedId === id) renderDetail(feeds[idx]);
        }
        if (s.status === 'error') {
          toast('❌ Помилка обробки', 'error');
          activeDetailTab = 'logs';
          if (activeFeedId === id) renderDetail(feeds[idx]);
        }
        updateLogBadge(feeds[idx]);
      }
    } catch(e) {}
  }, 2000);
}

function updateLogContainer(feed) {
  const container = document.getElementById('log-container');
  if (!container) return;
  const logs  = feed?.logs || [];

  // Оновлюємо badge на вкладці
  const badge = document.querySelector('.log-badge');
  if (badge) badge.textContent = logs.length;

  // Лічильник у заголовку
  const counter = document.getElementById('log-count');
  if (counter) counter.textContent = `${logs.length} записів`;

  if (logs.length === 0) {
    container.innerHTML = `<div class="log-empty">
      <div style="font-size:32px;margin-bottom:8px">📋</div>
      Журнал порожній — дії з'являться тут після обробки фіду
    </div>`;
    return;
  }

  const filter = document.getElementById('log-filter')?.value || 'all';
  const wasAtTop = container.scrollTop <= 10;

  container.innerHTML = [...logs].reverse()
    .filter(l => filter === 'all' || l.level === filter)
    .map(l => `
      <div class="log-row log-${l.level}" data-level="${l.level}">
        <span class="log-ts">${formatLogTs(l.ts)}</span>
        <span class="log-icon">${logIcon(l.level)}</span>
        <span class="log-msg">${esc(l.message)}</span>
      </div>`).join('');

  // Нові записи зверху — тримаємо скрол вгорі
  if (wasAtTop) container.scrollTop = 0;
}

function filterLogs() {
  const id = activeFeedId;
  if (!id) return;
  const feed = feeds.find(f => f.id === id);
  if (feed) updateLogContainer(feed);
}

function updateLogBadge(feed) {
  const badge = document.querySelector('.log-badge');
  const count = feed?.logs?.length || 0;
  if (badge) {
    badge.textContent = count;
    badge.style.display = count ? '' : 'none';
  }
}

function stopPolling() { clearInterval(pollTimer); pollTimer = null; }

// Перемикання табів
let activeTab = 'file';
function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab-row .tab-btn').forEach(b => {
    b.classList.toggle('active', b.getAttribute('onclick') === `switchTab('${tab}')`);
  });
  document.getElementById('tab-file').classList.toggle('active', tab === 'file');
  document.getElementById('tab-url').classList.toggle('active', tab === 'url');
}

function onUrlInput(input) {
  const nameField = document.getElementById('add-name-url');
  if (!nameField.value && input.value) {
    try {
      const url = new URL(input.value);
      const part = url.pathname.split('/').filter(Boolean).pop() || url.hostname;
      nameField.value = part.replace('.xml', '');
    } catch(e) {}
  }
}

function onFileChange(input) {
  const f = input.files[0];
  if (!f) return;
  document.getElementById('file-name-display').textContent = f.name;
  if (!document.getElementById('add-name').value)
    document.getElementById('add-name').value = f.name.replace('.xml','');
}

// ─────────────────────────────────────────────────────────
// Submit new feed
// ─────────────────────────────────────────────────────────
async function submitFeed() {
  const btn = document.getElementById('submit-btn');

  const fd = new FormData();
  fd.append('auto_process', 'false'); // НЕ запускаємо обробку одразу

  // ── Режим URL ──
  if (activeTab === 'url') {
    const url  = document.getElementById('add-feed-url').value.trim();
    const name = document.getElementById('add-name-url').value.trim();
    if (!url) { toast('Вкажіть URL фіду', 'error'); return; }
    if (!url.startsWith('http')) { toast('URL має починатись з http:// або https://', 'error'); return; }
    fd.append('feed_url', url);
    fd.append('name', name || url);
  }
  // ── Режим файл ──
  else {
    const fileInput = document.getElementById('add-file');
    if (!fileInput.files[0]) { toast('Оберіть XML файл', 'error'); return; }
    fd.append('file', fileInput.files[0]);
    fd.append('name', document.getElementById('add-name').value || fileInput.files[0].name);
  }

  btn.disabled = true; btn.textContent = '⏳ Завантаження...';

  try {
    const feed = await api('POST', '/api/feeds', fd);
    feeds.unshift(feed);
    toast('✅ Фід додано! Налаштуйте оформлення і запустіть генерацію.');
    // Відкриваємо фід одразу на вкладці "Зовнішній вигляд"
    activeFeedId = feed.id;
    activeDetailTab = 'design';
    await loadFeeds();
    renderDetail(feeds.find(f => f.id === feed.id));
  } catch(e) {
    toast(e.message, 'error');
    btn.disabled = false;
    btn.textContent = 'Далі: Налаштування оформлення →';
  }
}

async function saveSchedule(id) {
  const enabled  = document.getElementById('d-sched-enabled').checked;
  const run_time = document.getElementById('d-sched-time').value || '06:00';
  try {
    await api('PATCH', `/api/feeds/${id}/schedule`, { enabled, run_time, interval_hours: 24 });
    const idx = feeds.findIndex(f => f.id === id);
    if (idx !== -1) {
      feeds[idx].schedule = { ...feeds[idx].schedule, enabled, run_time, interval_hours: 24 };
      renderDetail(feeds[idx]);
    }
    toast(enabled ? `✅ Автооновлення увімкнено — щодня о ${run_time}` : '⏹ Автооновлення вимкнено');
  } catch(e) { toast(e.message, 'error'); }
}

// ─────────────────────────────────────────────────────────
// Log helpers
// ─────────────────────────────────────────────────────────
function formatLogTs(ts) {
  if (!ts) return '';
  try {
    const d = new Date(ts);
    const pad = n => String(n).padStart(2,'0');
    return `${pad(d.getDate())}.${pad(d.getMonth()+1)} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
  } catch { return ts; }
}

function logIcon(level) {
  return { info:'ℹ️', success:'✅', warning:'⚠️', error:'❌' }[level] || '•';
}

async function clearLogs(id) {
  if (!confirm('Очистити журнал подій?')) return;
  try {
    await api('DELETE', `/api/feeds/${id}/logs`);
    const idx = feeds.findIndex(f => f.id === id);
    if (idx !== -1) { feeds[idx].logs = []; renderDetail(feeds[idx]); }
    toast('🗑 Журнал очищено');
  } catch(e) { toast(e.message, 'error'); }
}

// ─────────────────────────────────────────────────────────
// Style picker
// ─────────────────────────────────────────────────────────
function selectCorner(field, val, el) {
  el.closest('.corner-picker').querySelectorAll('.corner-btn')
    .forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  const map = { 'badge_position': 'd-badge-position', 'domain_position': 'd-domain-position' };
  const inp = document.getElementById(map[field]);
  if (inp) inp.value = val;
}

function selectStyle(val, el) {
  document.querySelectorAll('.style-card').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('d-banner-style').value = val;
}

function selectStyleAdd(val, el) {
  document.querySelectorAll('.style-card').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('add-banner-style').value = val;
}

// ─────────────────────────────────────────────────────────
// Reprocess (без перезавантаження з URL)
// ─────────────────────────────────────────────────────────
async function reprocess(id) {
  const body = {
    border_color:    document.getElementById('d-border-color').value,
    border_width:    document.getElementById('d-border-width').value,
    badge_position:  document.getElementById('d-badge-position').value,
    badge_font_size: document.getElementById('d-badge-font-size').value,
    banner_style:    document.getElementById('d-banner-style').value,
    domain:          document.getElementById('d-domain').value,
    domain_position: document.getElementById('d-domain-position')?.value || 'bottom-left',
  };
  try {
    await api('POST', `/api/feeds/${id}/process`, body);
    toast('⚙️ Обробка запущена...');
    await loadFeeds();
    startPolling(id);
  } catch(e) { toast(e.message, 'error'); }
}

// ─────────────────────────────────────────────────────────
// Refresh (завантажити свіжий XML з URL + обробити)
// ─────────────────────────────────────────────────────────
async function refreshFeed(id) {
  const body = {
    border_color:    document.getElementById('d-border-color').value,
    border_width:    document.getElementById('d-border-width').value,
    badge_position:  document.getElementById('d-badge-position').value,
    badge_font_size: document.getElementById('d-badge-font-size').value,
    banner_style:    document.getElementById('d-banner-style').value,
    domain:          document.getElementById('d-domain').value,
    domain_position: document.getElementById('d-domain-position')?.value || 'bottom-left',
  };
  try {
    await api('POST', `/api/feeds/${id}/refresh`, body);
    toast('🔄 Завантажуємо оновлений фід з URL...');
    await loadFeeds();
    startPolling(id);
  } catch(e) { toast(e.message, 'error'); }
}

// ─────────────────────────────────────────────────────────
// Delete
// ─────────────────────────────────────────────────────────
async function deleteFeed(id) {
  if (!confirm('Видалити фід? Цю дію не можна скасувати.')) return;
  try {
    await api('DELETE', `/api/feeds/${id}`);
    feeds = feeds.filter(f => f.id !== id);
    activeFeedId = null;
    renderList();
    document.getElementById('panel-right').innerHTML = `
      <div class="welcome">
        <div class="big-icon">🗑</div>
        <h2>Фід видалено</h2>
        <button class="btn btn-primary" style="margin-top:8px" onclick="showAddPanel()">Додати новий</button>
      </div>`;
    toast('Фід видалено');
  } catch(e) { toast(e.message, 'error'); }
}

// ─────────────────────────────────────────────────────────
// Helpers
// ─────────────────────────────────────────────────────────
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function formatDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleString('uk-UA', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
}

// ─────────────────────────────────────────────────────────
// Init
// ─────────────────────────────────────────────────────────
loadFeeds();
setInterval(loadFeeds, 10000); // оновлюємо список кожні 10с
</script>
</body>
</html>
